px}#auth-gate[data-astro-cid-hfbr3nnz] .divider[data-astro-cid-hfbr3nnz]:before{margin-right:12px}#auth-gate[data-astro-cid-hfbr3nnz] .divider[data-astro-cid-hfbr3nnz]:after{margin-left:12px}#auth-gate[data-astro-cid-hfbr3nnz] .tips[data-astro-cid-hfbr3nnz]{text-align:left;color:#4b5563;background:#f9fafb;border-radius:8px;margin-top:24px;padding:14px 16px;font-size:13px}#auth-gate[data-astro-cid-hfbr3nnz] .tips[data-astro-cid-hfbr3nnz] p[data-astro-cid-hfbr3nnz]{margin-bottom:6px}#auth-gate[data-astro-cid-hfbr3nnz] .tips[data-astro-cid-hfbr3nnz] p[data-astro-cid-hfbr3nnz]:last-child{margin-bottom:0}#auth-gate[data-astro-cid-hfbr3nnz] .msg[data-astro-cid-hfbr3nnz]{text-align:left;border-radius:8px;margin-bottom:20px;padding:12px 14px;font-size:13px;line-height:1.5;display:none}#auth-gate[data-astro-cid-hfbr3nnz] .msg[data-astro-cid-hfbr3nnz].error{color:#dc2626;background:#fef2f2;border:1px solid #fecaca;display:block}#auth-gate[data-astro-cid-hfbr3nnz] .msg[data-astro-cid-hfbr3nnz].info{color:#2563eb;background:#eff6ff;border:1px solid #bfdbfe;display:block}#auth-gate[data-astro-cid-hfbr3nnz] .msg[data-astro-cid-hfbr3nnz].success{color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0;display:block}#auth-gate[data-astro-cid-hfbr3nnz] .back-link[data-astro-cid-hfbr3nnz]{margin-top:24px;font-size:13px}#auth-gate[data-astro-cid-hfbr3nnz] .back-link[data-astro-cid-hfbr3nnz] a[data-astro-cid-hfbr3nnz]{color:#6b7280;text-decoration:underline}#cms-container[data-astro-cid-hfbr3nnz]{height:100vh;display:none}
</style></head><body data-astro-cid-hfbr3nnz><!-- 未登录封面 --><div id="auth-gate" data-astro-cid-hfbr3nnz><div class="card" data-astro-cid-hfbr3nnz><h1 data-astro-cid-hfbr3nnz>AubreyInspo</h1><p class="sub" data-astro-cid-hfbr3nnz>内容管理后台</p><div class="msg" id="msg" data-astro-cid-hfbr3nnz></div><div class="actions" data-astro-cid-hfbr3nnz><button class="btn btn-primary" id="signup-btn" onclick="doSignup(event)" data-astro-cid-hfbr3nnz>注册新账号</button><div class="divider" data-astro-cid-hfbr3nnz>或</div><button class="btn btn-outline" id="login-btn" onclick="doLogin(event)" data-astro-cid-hfbr3nnz>登录已有账号</button></div><div class="tips" data-astro-cid-hfbr3nnz><p data-astro-cid-hfbr3nnz>• 推荐使用 <strong data-astro-cid-hfbr3nnz>GitHub 账号</strong> 一键登录（下方按钮）</p><p data-astro-cid-hfbr3nnz>• 若弹窗被拦截，请点击地址栏右侧图标允许</p><p data-astro-cid-hfbr3nnz>• 登录后无需重复操作</p></div><div class="back-link" data-astro-cid-hfbr3nnz><a href="/" data-astro-cid-hfbr3nnz>← 返回画廊首页</a></div></div></div><!-- 已登录 → Decap CMS 容器 --><div id="cms-container" data-astro-cid-hfbr3nnz></div><!-- 1. Identity Widget（本地托管，避免被浏览器插件拦截）--><script src="/netlify-identity-widget.js"></script><script>
(function() {
  var authGate = document.getElementById('auth-gate');
  var cmsContainer = document.getElementById('cms-container');
  var msgEl = document.getElementById('msg');
  var widgetStart = Date.now();
  var maxWait = 15000; // 最多等 15 秒

  function showMsg(type, text) {
    msgEl.className = 'msg ' + type;
    msgEl.innerHTML = text;
  }

  window.doSignup = function(e) {
    e.preventDefault();
    if (window.netlifyIdentity && window.netlifyIdentity.open) {
      window.netlifyIdentity.open('signup');
    }
  };

  window.doLogin = function(e) {
    e.preventDefault();
    if (window.netlifyIdentity && window.netlifyIdentity.open) {
      window.netlifyIdentity.open('login');
    }
  };

  function waitForWidget() {
    if (window.netlifyIdentity) {
      // Widget 已加载
      window.netlifyIdentity.on("init", function(user) {
        if (user) {
          authGate.style.display = 'none';
          cmsContainer.style.display = 'block';
          var script = document.createElement('script');
          script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
          document.body.appendChild(script);
        }
      });

      window.netlifyIdentity.on("login", function() {
        window.location.href = '/admin/';
      });

      window.netlifyIdentity.on("signup", function() {
        window.location.href = '/admin/';
      });

      window.netlifyIdentity.on("error", function(err) {
        showMsg('error', '操作失败：' + (err && err.message ? err.message : err));
      });

      window.netlifyIdentity.init();
      return;
    }

    if (Date.now() - widgetStart > maxWait) {
      showMsg('error',
        '身份认证组件加载超时。<br><br>' +
        '可能原因：<br>' +
        '1. 网络不稳定，请检查连接后刷新重试<br>' +
        '2. 广告/追踪拦截插件阻止了 identity.netlify.com<br>' +
        '3. 公司/学校网络屏蔽了该域名<br><br>' +
        '<small>如果持续失败，请在浏览器中直接访问：<br>' +
        '<a href="https://identity.netlify.com/v1/netlify-identity-widget.js" target="_blank">' +
        'https://identity.netlify.com/v1/netlify-identity-widget.js</a><br>' +
        '看是否能正常打开。</small>'
      );
      return;
    }

    setTimeout(waitForWidget, 200);
  }

  waitForWidget();
})();
</script></body></html>
