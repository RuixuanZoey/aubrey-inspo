<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#ffffff"/>
  <rect x="80" y="0" width="640" height="600" fill="#f8f9fa"/>
  <rect x="80" y="100" width="300" height="380" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="230" y="180" font-family="Arial" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">方案 A</text>
  <text x="230" y="280" font-family="Arial" font-size="16" fill="#6b7280" text-anchor="middle">传统解决方案</text>
  <text x="230" y="330" font-family="Arial" font-size="14" fill="#9ca3af" text-anchor="middle">• 部署周期长</text>
  <text x="230" y="360" font-family="Arial" font-size="14" fill="#9ca3af" text-anchor="middle">• 维护成本高</text>
  <text x="230" y="390" font-family="Arial" font-size="14" fill="#9ca3af" text-anchor="middle">• 扩展性差</text>
  <rect x="420" y="100" width="300" height="380" rx="16" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="570" y="180" font-family="Arial" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle">方案 B</text>
  <text x="570" y="280" font-family="Arial" font-size="16" fill="#1d4ed8" text-anchor="middle">智能云平台</text>
  <text x="570" y="330" font-family="Arial" font-size="14" fill="#4b5563" text-anchor="middle">• 一键部署</text>
  <text x="570" y="360" font-family="Arial" font-size="14" fill="#4b5563" text-anchor="middle">• 自动化运维</text>
  <text x="570" y="390" font-family="Arial" font-size="14" fill="#4b5563" text-anchor="middle">• 弹性扩展</text>
  <text x="400" y="560" font-family="Arial" font-size="18" fill="#9ca3af" text-anchor="middle">对比分析：方案 A vs 方案 B</text>
</svg>