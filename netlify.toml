[build]
  command = "npm run build"
  publish = "dist"

# 重定向 /admin 到 /admin/index.html（确保 SPA 路由正常）
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# 安全头（保护 admin 页面）
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Content-Security-Policy = "frame-ancestors 'none'"
